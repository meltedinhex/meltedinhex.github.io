# Single source of truth for the Threat Tracker (/tracker/) and the
# Detection coverage index (/detections/).
#
# Each entry describes one analysed threat. Add `detections:` to surface a
# campaign on the detections page. `featured: true` pins it to the top.
#
# repo  = folder name under github.com/meltedinhex/detections
# static = folder name under /detections/<...>/ on this site (raw files)

campaigns:
  - name: "PolinRider"
    slug: "polinrider-blockchain-dead-drop-npm"
    title: "Dead Drops on the Blockchain"
    family: "BeaverTail → InvisibleFerret"
    actor: "DPRK / Lazarus"
    platform: "npm"
    category: "Supply chain"
    date: "2026-06-22"
    featured: true
    summary: >-
      An npm package that hides its payload on public blockchains (EtherHiding).
      A TRON pointer resolves to a Binance Smart Chain burn-address transaction
      whose data field carries an XOR-encrypted loader, ending in a version-gated
      BeaverTail → InvisibleFerret chain.
    attack: ["T1195.002", "T1204.002", "T1059.007", "T1620", "T1027", "T1140", "T1564.003", "T1102", "T1105", "T1573"]
    detections:
      repo: "polinrider-blockchain-loader"
      static: "polinrider-blockchain-dead-drop-npm"
      coverage: ["YARA", "Sigma", "KQL", "IOCs"]

  - name: "Shai-Hulud (nhmpy)"
    slug: "shai-hulud-nhmpy-pypi"
    title: "Peeling the Sandworm"
    family: "Shai-Hulud · Hades wave"
    actor: "Unattributed"
    platform: "PyPI"
    category: "Supply chain"
    date: "2026-06-14"
    featured: true
    summary: >-
      A PyPI package one keystroke from NumPy that ships a full working copy of
      NumPy as cover. A .pth file runs at interpreter start and executes a 5.2 MB
      JavaScript credential stealer through a Bun runtime pulled from GitHub.
    attack: ["T1195.002", "T1059.007", "T1547", "T1552.001", "T1041"]
    detections:
      repo: "nhmpy-hades-pypi"
      static: "shai-hulud-nhmpy-pypi"
      coverage: ["YARA", "Sigma", "KQL", "IOCs"]


title: Python Interpreter Spawning Bun Runtime
id: 7b3f1c2a-9d44-4e8c-9b6a-1c2a9d444e8c
status: experimental
description: >
    Detects a Python interpreter (or pip/pytest) spawning the Bun JavaScript runtime,
    the core execution chain of the nhmpy / Hades PyPI supply-chain worm, where a .pth
    auto-exec drops Bun and runs an obfuscated _index.js stealer.
references:
    - https://meltedinhex.com/posts/shai-hulud-nhmpy-pypi/
author: meltedinhex
date: 2026-06-14
tags:
    - attack.execution
    - attack.t1059
    - attack.t1195.001
    - attack.t1546
logsource:
    category: process_creation
detection:
    selection_bun:
        Image|endswith:
            - '\bun.exe'
            - '/bun'
        ParentImage|endswith:
            - '\python.exe'
            - '/python'
            - '/python3'
            - '\pip.exe'
            - '/pip'
            - '/pip3'
            - '\pytest.exe'
            - '/pytest'
    selection_cmd:
        CommandLine|contains: 'run'
    condition: selection_bun and selection_cmd
falsepositives:
    - Developer environments where Bun is legitimately invoked from Python tooling (rare)
level: high
